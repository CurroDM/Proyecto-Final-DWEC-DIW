<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Inicio de sesión</title>
	<link rel="shortcut icon" href="icons/odontologia.png" type="image/x-icon">

	<div id="Bootstrap">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
	  </div>
    
	<link rel="stylesheet" href="https://necolas.github.io/normalize.css/8.0.1/normalize.css">
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
	 
	<link rel="stylesheet" href="iniciodesesion.css">
	<link rel="stylesheet" href="style.css">
	<script src="iniciosesion.js"></script>
</head>
<body>
	<!--BARRAS DE NAVEGACION-->
    <header>
		<div id="nav1"></div>
		<div id="nav2"></div>
		<script type="text/javascript" src="Nav&Footer.js"></script>
	  </header>
	<main>
		<h1>Inicio de sesión</h1>

        <form class="container col-lg-3 col-md-6 col-sm-12" id="form" style="display: block;">
            <div>
              <label for="email" class="form-label">Usuario</label>
              <input type="email" class="form-control" id="email" placeholder="email@ejemplo.com">
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <input type="password" class="form-control" id="password" placeholder="Contraseña">
            </div>
            <div class="enlaces">
                <div class="mb-3">
                    <a href="recordarpass.html">Recordar contraseña</a>
                </div>
      
                <button type="button" id="botonInicio" onclick="iniciosesion()" class="btn btn-primary">Iniciar sesión</button>
      
                <hr>
                
                <a id="register-form-link" href="registro.html">¿No tienes cuenta?</a>
            </div>
          </form>
        </div>
        <div id="mensaje" style="display: none;">
            <p>Bienvenido a Dens <span id="usuario_mensaje"></span>
                <img src="icons/check.png" alt="check" width="100">
            </p>
            
            <button type="button" id="botonCerrar" onclick="cerrarsesion()" class="btn btn-primary">Cerrar sesión</button>
        </div>
	</main>

	<script src="https://kit.fontawesome.com/2c36e9b7b1.js" crossorigin="anonymous"></script>

	<!--FOOTER-->
    <footer class="footer text-white font-weight-bold">
		<div id="footer"></div>
		<script type="text/javascript" src="Nav&Footer.js"></script>
	  </footer>
</body>
