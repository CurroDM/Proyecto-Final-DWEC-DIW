<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro con éxito</title>
    <link rel="shortcut icon" href="icons/odontologia.png" type="image/x-icon">
    <div id="Bootstrap">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>
      <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    </div>
    <link rel="stylesheet" href="style.css">
    <style>
      main .container{
        background-color: #d2e1e2;
        border-radius: 1em;
        padding: 2em;
        text-align: center;
        margin-bottom: 3em;
      }
      .container button{
	      background-color: #406e73;
	      color: white;
	      border: none;
	      margin-top: 2em;
      }
      .container button:hover{
	      background-color: #9bc6ca;
      }
      #respuesta{
        color: green;
      }
    </style>
    <script>
        function Restablecer(){
            document.getElementById("respuesta").innerHTML='Se le ha enviado un correo para restablecer la contraseña';
            document.getElementById("mail").value = "";
        }
    </script>
</head>
<body>
    <!--BARRAS DE NAVEGACION-->
      <header>
        <div id="nav1"></div>
        <div id="nav2"></div>
        <script type="text/javascript" src="Nav&Footer.js"></script>
      </header>
      <!--main-->
      <main>
        <h1>Recordar contraseña</h1>
            <div class="container col-lg-4 col-md-6 col-sm-12">
                <p>Introduce un email para recuperar la contraseña:</p>
                <p id="respuesta"></p>
                <p>
                  <input type="email" name="mail" id="mail">
                </p>
                
                <button class="btn btn-primary" onclick="Restablecer()">Restablecer contraseña</button>
            </div>
          
      </main>
      <!--FOOTER-->
      <footer class="footer text-white font-weight-bold">
        <div id="footer"></div>
        <script type="text/javascript" src="Nav&Footer.js"></script>
      </footer>
    </body>
</body>
</html>
